InpaintModeDesc = macOS için önerilen varsayılan OpenCV. LAMA/STTN/ProPainter CPU/MPS tarafında deneysel veya yavaş; sadece ölçerek kullan.
    STTN Altyazı Algılama: Altyazı algılama ile, akıllı tamir yok (minimum 4GB VRAM)
    LAMA: Animasyon videoları için iyi, orta hız (düşük VRAM gereksinimi)
    ProPainter: Çok fazla VRAM tüketir, daha yavaş hız, yoğun hareket içeren videolar için en iyisi (minimum 8GB VRAM)
    OpenCV: Ultra hızlı mod, tamir efekti garanti edilmez, yalnızca algılanan bölgelerdeki metni kaldırır (düşük VRAM gereksinimi)
